<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Great Lake">
<meta name="theme-color" content="#0a1628">
<meta name="description" content="The Great Lake — Leadership Clarity Engine">
<link rel="manifest" href="/manifest.json">
<title>The Great Lake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: box-shadow 0.6s ease, border-color 0.6s ease; }
:root {
  --lake-deep: #0a1628;
  --lake-mid: #0d1f3c;
  --lake-surface: #132844;
  --lake-shimmer: #1a3a5c;
  --lake-glow: #2d8cf0;
  --lake-light: #64b5f6;
  --lake-foam: #b3e5fc;
  --lake-white: #e1f5fe;
  --dock-bg: #091420;
  --dock-border: #1a3050;
  --sand: #c8a96e;
  --driftwood: #8b7355;
  --calm: #4fc3f7;
  --analytical: #7c4dff;
  --stormy: #ff6e40;
  --text-primary: #e1f5fe;
  --text-secondary: #80b4d8;
  --text-dim: #4a6d8c;
  --danger: #ef5350;
  --success: #66bb6a;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --current-mood-glow: var(--calm);
}
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--lake-deep); color: var(--text-primary); display: flex; flex-direction: column; overscroll-behavior: none; }

/* ── WAVE BUTTON ── */
.wave-button {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--lake-glow), var(--lake-light));
  border: none;
  cursor: pointer;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(45, 140, 240, 0.3);
  transition: box-shadow 0.6s ease, transform 0.2s ease;
  z-index: 100;
}

.wave-button.mood-glow {
  box-shadow: 0 0 24px var(--current-mood-glow), 0 4px 16px rgba(45, 140, 240, 0.4);
}

.wave-button.mood-calm {
  --current-mood-glow: #4fc3f7;
}

.wave-button.mood-analytical {
  --current-mood-glow: #7c4dff;
}

.wave-button.mood-stormy {
  --current-mood-glow: #ff6e40;
}

.wave-button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 28px var(--current-mood-glow), 0 6px 20px rgba(45, 140, 240, 0.5);
}

.wave-button:active {
  transform: scale(0.95);
}

@keyframes moodPulse {
  0%, 100% { box-shadow: 0 0 24px var(--current-mood-glow), 0 4px 16px rgba(45, 140, 240, 0.4); }
  50% { box-shadow: 0 0 32px var(--current-mood-glow), 0 4px 16px rgba(45, 140, 240, 0.6); }
}

.wave-button.mood-glow {
  animation: moodPulse 3s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="app-layout">
  <div class="dock"></div>
  <div class="lake-window">
    <div class="lake-header"></div>
    <div class="currents-bar"></div>
    <div class="waves-container"></div>
  </div>
</div>

<!-- Wave Button (floating action) -->
<button id="waveBtn" class="wave-button mood-glow mood-calm" title="Get today's Super-Powerful Principle">🌊</button>

<script>
const waveBtn = document.getElementById('waveBtn');
const moodMap = { calm: 'mood-calm', analytical: 'mood-analytical', stormy: 'mood-stormy' };

function updateWaveButtonGlow() {
  const currentMood = localStorage.getItem('currentMood') || 'calm';
  waveBtn.className = 'wave-button mood-glow ' + (moodMap[currentMood] || 'mood-calm');
}

waveBtn.addEventListener('click', triggerSuperPowerfulPrinciple);
window.addEventListener('storage', updateWaveButtonGlow);

function triggerSuperPowerfulPrinciple() {
  const currentMood = localStorage.getItem('currentMood') || 'calm';
  const userName = localStorage.getItem('userName') || 'there';
  
  const superPowerfulPrompt = "Lake, give me today's Super‑Powerful Principle — one sentence that cuts through confusion, raises my Lake Score, and tells me exactly where to start today.";
  
  sendMessageToLake(superPowerfulPrompt, currentMood, userName);
}

function sendMessageToLake(message, mood, userName) {
  const payload = {
    message: message,
    mood: mood,
    userName: userName,
    history: JSON.stringify([])
  };
  
  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if (data.reflection) {
      displayReflection(data.reflection, mood, userName);
    }
  })
  .catch(err => console.error('Error:', err));
}

function displayReflection(reflection, mood, userName) {
  const wavesContainer = document.querySelector('.waves-container');
  if (!wavesContainer) return;
  
  const userWave = document.createElement('div');
  userWave.className = 'wave user-wave';
  userWave.innerHTML = `
    <div class="wave-avatar">👤</div>
    <div class="wave-content">
      <div class="wave-sender">You</div>
      <div class="wave-bubble">Lake, give me today's Super‑Powerful Principle — one sentence that cuts through confusion, raises my Lake Score, and tells me exactly where to start today.</div>
    </div>
  `;
  
  const lakeWave = document.createElement('div');
  lakeWave.className = 'wave lake-wave';
  lakeWave.innerHTML = `
    <div class="wave-avatar">🌊</div>
    <div class="wave-content">
      <div class="wave-sender">The Lake</div>
      <div class="wave-bubble">${reflection}</div>
    </div>
  `;
  
  wavesContainer.appendChild(userWave);
  wavesContainer.appendChild(lakeWave);
  wavesContainer.scrollTop = wavesContainer.scrollHeight;
}

updateWaveButtonGlow();
</script>
</body>
</html>

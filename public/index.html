<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Great Lake">
<meta name="theme-color" content="#0a1628">
<meta name="description" content="The Great Lake — Leadership Clarity Engine">
<link rel="manifest" href="/manifest.json">
<title>The Great Lake</title>
<style>
/* ── RESET ── */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ── VARIABLES ── */
:root {
  --lake-deep: #0a1628;
  --lake-mid: #0d1f3c;
  --lake-surface: #132844;
  --lake-shimmer: #1a3a5c;
  --lake-glow: #2d8cf0;
  --lake-light: #64b5f6;
  --lake-foam: #b3e5fc;
  --lake-white: #e1f5fe;
  --dock-bg: #091420;
  --dock-border: #1a3050;
  --sand: #c8a96e;
  --driftwood: #8b7355;
  --calm: #4fc3f7;
  --analytical: #7c4dff;
  --stormy: #ff6e40;
  --text-primary: #e1f5fe;
  --text-secondary: #80b4d8;
  --text-dim: #4a6d8c;
  --danger: #ef5350;
  --success: #66bb6a;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* ── BASE ── */
html, body {
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--lake-deep);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  overscroll-behavior: none;
}

/* ── WATER BG ── */
.water-bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.water-bg::before {
  content: '';
  position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(45,140,240,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(100,181,246,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(45,140,240,0.05) 0%, transparent 50%);
  animation: waterDrift 20s ease-in-out infinite;
}
@keyframes waterDrift {
  0%, 100% { transform: translate(0,0) rotate(0deg); }
  25%       { transform: translate(-20px,10px) rotate(1deg); }
  50%       { transform: translate(10px,-15px) rotate(-0.5deg); }
  75%       { transform: translate(-10px,5px) rotate(0.5deg); }
}
@keyframes gentleFloat {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}
@keyframes lakeLogoPulse {
  0%, 100% { filter: drop-shadow(0 0 8px var(--lake-glow)); }
  50%       { filter: drop-shadow(0 0 18px var(--lake-light)); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
@keyframes waveIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes rippleAnim {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30%           { opacity: 1;   transform: translateY(-5px); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes slideUpCard {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* ── LOGIN ── */
.login-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--lake-deep);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; padding-top: calc(24px + var(--safe-top));
  overflow-y: auto;
}
.login-screen.hidden { display: none; }
.login-logo { font-size: 72px; margin-bottom: 16px; animation: gentleFloat 4s ease-in-out infinite; }
.login-title { font-size: 32px; font-weight: 700; color: var(--lake-light); margin-bottom: 6px; text-align: center; }
.login-sub   { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 32px; letter-spacing: 0.5px; }
.login-card  { width: 100%; max-width: 380px; background: var(--lake-surface); border: 1px solid var(--dock-border); border-radius: 20px; padding: 28px; }
.login-card h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 20px; text-align: center; }
.profile-pic-upload { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; cursor: pointer; }
.profile-pic-preview {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--lake-glow), var(--lake-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 8px; overflow: hidden;
  border: 2px solid var(--dock-border); transition: border-color 0.2s; position: relative;
}
.profile-pic-preview:hover { border-color: var(--lake-glow); }
.profile-pic-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.profile-pic-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; opacity: 0; transition: opacity 0.2s;
}
.profile-pic-preview:hover .profile-pic-overlay { opacity: 1; }
.profile-pic-hint { font-size: 11px; color: var(--text-dim); }
#profilePicInput { display: none; }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 14px 16px;
  background: var(--lake-mid); border: 1px solid var(--dock-border); border-radius: 12px;
  color: var(--text-primary); font-size: 16px; outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.login-field input:focus { border-color: var(--lake-glow); box-shadow: 0 0 0 3px rgba(45,140,240,0.1); }
.login-field input::placeholder { color: var(--text-dim); }
.login-field input + input { margin-top: 8px; }
.login-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--lake-glow), var(--lake-light));
  border: none; border-radius: 14px;
  color: var(--lake-deep); font-size: 16px; font-weight: 700;
  cursor: pointer; margin-top: 8px; transition: all 0.2s;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(45,140,240,0.3); }
.login-divider {
  text-align: center; color: var(--text-dim); font-size: 12px;
  margin: 16px 0; position: relative;
}
.login-divider::before, .login-divider::after {
  content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--dock-border);
}
.login-divider::before { left: 0; }
.login-divider::after  { right: 0; }
.login-guest-btn {
  width: 100%; padding: 14px; background: transparent;
  border: 1px solid var(--dock-border); border-radius: 14px;
  color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: all 0.2s;
}
.login-guest-btn:hover { background: var(--lake-mid); color: var(--lake-light); }
.login-install-hint {
  margin-top: 24px; padding: 14px 20px;
  background: rgba(45,140,240,0.08); border: 1px solid rgba(45,140,240,0.15);
  border-radius: 14px; text-align: center; font-size: 12px; color: var(--text-dim);
  max-width: 380px; width: 100%;
}
.login-install-hint strong { color: var(--lake-light); }

/* ── APP LAYOUT ── */
.app-layout {
  display: flex;
  height: 100%;
  height: -webkit-fill-available;
  position: relative; z-index: 1;
}

</style>
</head>

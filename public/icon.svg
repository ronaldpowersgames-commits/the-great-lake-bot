<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark lake background -->
  <rect width="512" height="512" rx="100" fill="#0a1628"/>
  
  <!-- Glow effect -->
  <radialGradient id="glow" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#2d8cf0" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>
  
  <!-- Wave 1 — back, darkest -->
  <path d="M0 290 
    C60 260, 120 320, 180 290 
    C240 260, 300 320, 360 290 
    C420 260, 480 320, 512 290 
    L512 512 L0 512 Z" 
    fill="#0d1f3c" opacity="0.8"/>

  <!-- Wave 2 — middle -->
  <path d="M0 320 
    C50 290, 110 350, 170 315 
    C230 280, 290 345, 355 315 
    C410 290, 465 345, 512 320 
    L512 512 L0 512 Z" 
    fill="#132844" opacity="0.9"/>

  <!-- Wave 3 — main blue wave -->
  <path d="M0 355
    C40 325, 90 375, 145 348
    C200 320, 255 370, 310 348
    C365 325, 420 372, 470 350
    C490 341, 502 346, 512 343
    L512 512 L0 512 Z"
    fill="url(#waveGrad)"/>

  <!-- Wave 4 — front highlight -->
  <path d="M0 390
    C35 368, 75 400, 120 382
    C165 364, 210 398, 260 380
    C310 362, 355 395, 400 378
    C440 363, 478 388, 512 375
    L512 512 L0 512 Z"
    fill="#2d8cf0" opacity="0.5"/>

  <!-- Sparkle highlights on wave -->
  <ellipse cx="145" cy="348" rx="8" ry="3" fill="#64b5f6" opacity="0.8"/>
  <ellipse cx="310" cy="348" rx="6" ry="2" fill="#64b5f6" opacity="0.6"/>
  <ellipse cx="470" cy="350" rx="7" ry="2.5" fill="#64b5f6" opacity="0.7"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a6fc4"/>
      <stop offset="50%" stop-color="#2d8cf0"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
  </defs>
</svg>

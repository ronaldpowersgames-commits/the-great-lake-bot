services:
  - type: web
    name: the-great-lake-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: The Great Lake Bot
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: thegreatlakebot
      - key: JWT_AUDIENCE
        value: the-great-lake-bot
      - key: JWT_EXPIRY
        value: 24h
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: GOVERNANCE_STRICT_MODE
        value: "true"
      - key: MAX_FIELD_LENGTH
        value: "2000"
      - key: MAX_SUMMARY_LENGTH
        value: "1500"
      - key: MAX_NICKNAME_LENGTH
        value: "50"
      - key: MAX_MESSAGE_LENGTH
        value: "5000"
      - key: MAX_UPDATE_COMMAND_LENGTH
        value: "3000"
